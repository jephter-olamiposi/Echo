events {
    worker_connections 1024;
}

http {
    upstream backend {
        # When running Nginx in Docker on Mac, use host.docker.internal to reach the host machine
        server host.docker.internal:3000;
    }

    server {
        # Listen on port 80 (HTTP) for now.
        # To test HTTPS, you would listen on 443 ssl.
        listen 80;
        
        # If testing from another machine, use your machine's LAN IP here (e.g., 192.168.1.50)
        # or use default_server to catch all traffic.
        server_name _; 

        # --- HTTPS Configuration (Uncomment when you have certs) ---
        # listen 443 ssl;
        # ssl_certificate     /path/to/your/cert.pem;
        # ssl_certificate_key /path/to/your/key.pem;
        # ---------------------------------------------------------

        location / {
            proxy_pass http://backend;
            
            # REQUIRED for WebSockets (Axum /ws route)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
